tags:
  - Contacts
summary: Update contact
operationId: patchContact
description: Updates an existing contact by id for the authenticated user
security:
  - bearerAuth: []
parameters:
  - in: path
    name: contactId
    required: true
    schema:
      type: string
    description: Contact id
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        properties:
          name:
            type: string
            minLength: 3
            maxLength: 20
            example: Yusuf Soylu
          phoneNumber:
            type: string
            minLength: 3
            maxLength: 20
            example: "5551234567"
          email:
            type: string
            format: email
            minLength: 3
            maxLength: 20
            example: yusuf@example.com
          isFavourite:
            type: boolean
            example: true
          contactType:
            type: string
            enum: [work, home, personal]
            example: work
          photo:
            type: string
            format: binary
responses:
  '200':
    description: Successfully patched a contact
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully patched a contact!
            data:
              $ref: ../../../components/schemas/contact.yaml
  '401':
    $ref: ../../../components/responses/401.yaml
  '404':
    $ref: ../../../components/responses/404.yaml