tags:
  - Contacts
summary: Get contact by id
operationId: getContactById
description: Returns a single contact by its id for the authenticated user
security:
  - bearerAuth: []
parameters:
  - in: path
    name: contactId
    required: true
    schema:
      type: string
    description: Contact id
responses:
  '200':
    description: Successfully found contact
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found contact with id 6803f1a1b2c3d4e5f6789012!
            data:
              $ref: ../../../components/schemas/contact.yaml
  '401':
    $ref: ../../../components/responses/401.yaml
  '404':
    $ref: ../../../components/responses/404.yaml