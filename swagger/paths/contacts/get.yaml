tags:
  - Contacts
summary: Get all contacts
operationId: getAllContacts
description: Returns a paginated list of contacts for the authenticated user
security:
  - bearerAuth: []
parameters:
  - in: query
    name: page
    schema:
      type: integer
      example: 1
    description: Page number. Default is 1.
  - in: query
    name: perPage
    schema:
      type: integer
      example: 10
    description: Items per page. Default is 10.
  - in: query
    name: sortBy
    schema:
      type: string
      enum: [_id, name, phoneNumber, email, isFavourite, contactType]
      example: name
    description: Field used for sorting.
  - in: query
    name: sortOrder
    schema:
      type: string
      enum: [asc, desc]
      example: asc
    description: Sort direction. Default is asc.
  - in: query
    name: contactType
    schema:
      type: string
      enum: [work, home, personal]
      example: personal
    description: Filter by contact type.
  - in: query
    name: type
    schema:
      type: string
      enum: [work, home, personal]
      example: personal
    description: Alternative query param for contact type.
  - in: query
    name: isFavourite
    schema:
      type: boolean
      example: true
    description: Filter by favourite status.
responses:
  '200':
    description: Successfully found contacts
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found contacts!
            data:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: ../../components/schemas/contact.yaml
                page:
                  type: integer
                  example: 1
                perPage:
                  type: integer
                  example: 10
                totalItems:
                  type: integer
                  example: 2
                totalPages:
                  type: integer
                  example: 1
                hasPreviousPage:
                  type: boolean
                  example: false
                hasNextPage:
                  type: boolean
                  example: false
  '401':
    $ref: ../../components/responses/401.yaml