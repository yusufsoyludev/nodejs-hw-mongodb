type: object
required:
  - _id
  - name
  - phoneNumber
  - isFavourite
  - contactType
  - userId
  - createdAt
  - updatedAt
properties:
  _id:
    type: string
    example: 6803f1a1b2c3d4e5f6789012
  name:
    type: string
    example: Yusuf Soylu
  phoneNumber:
    type: string
    example: "5551234567"
  email:
    type: string
    format: email
    example: yusuf@example.com
  isFavourite:
    type: boolean
    example: true
  contactType:
    type: string
    enum: [work, home, personal]
    example: personal
  userId:
    type: string
    example: 6803f1a1b2c3d4e5f6789999
  photo:
    type: string
    format: uri
    example: https://res.cloudinary.com/demo/image/upload/sample.jpg
  createdAt:
    type: string
    format: date-time
    example: 2026-04-19T12:00:00.000Z
  updatedAt:
    type: string
    format: date-time
    example: 2026-04-19T12:10:00.000Z