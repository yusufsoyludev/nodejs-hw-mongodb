openapi: 3.1.0
info:
  version: 1.0.0
  title: Contacts API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  description: >
    API for managing contacts with authentication, pagination, sorting,
    filtering and image upload support.

tags:
  - name: Contacts
    description: Operations for managing user contacts

servers:
  - url: http://localhost:3000
  - url: https://YOUR-RENDER-URL.onrender.com

paths:
  /contacts:
    get:
      $ref: ../swagger/paths/contacts/get.yaml
    post:
      $ref: ../swagger/paths/contacts/post.yaml

  /contacts/{contactId}:
    get:
      $ref: ../swagger/paths/contacts/{contactId}/get.yaml
    patch:
      $ref: ../swagger/paths/contacts/{contactId}/patch.yaml
    delete:
      $ref: ../swagger/paths/contacts/{contactId}/delete.yaml

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer